services:
  postgres:
    image: postgres:16-alpine
    container_name: skelvete_db
    environment:
      POSTGRES_USER: skelvete_user
      POSTGRES_PASSWORD: skelvete_password
      POSTGRES_DB: skelvete_db
    ports:
      - "5433:5432"
    volumes:
      - skelvete_db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skelvete_user -d skelvete_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skelvete_db_data:
